name: Automated Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  # ── 1. Parse commit message ────────────────────────────────
  check:
    name: Check Commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get latest commit message
        id: commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Skip dev/testing commits
        if: |
          contains(steps.commit.outputs.commit_msg, 'Testing') ||
          contains(steps.commit.outputs.commit_msg, 'Dev') ||
          contains(steps.commit.outputs.commit_msg, 'Development')
        run: |
          echo "Commit is for Testing/Dev/Development. Skipping release."
          exit 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(echo '${{ steps.commit.outputs.commit_msg }}' | grep -o 'V[0-9]\+\.[0-9]\+\.[0-9]\+')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check version found
        run: |
          if [ -z "${{ steps.version.outputs.VERSION }}" ]; then
            echo "No version found in commit message. Skipping release."
            exit 0
          fi

  # ── 2. Build Windows EXE ──────────────────────────────────
  build:
    name: Build Windows EXE
    needs: check
    if: needs.check.outputs.version != ''
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller tzdata

      - name: Build single-file EXE
        run: pyinstaller tz_convert.spec --noconfirm

      - name: Verify build
        run: |
          if (Test-Path "dist\tz-convert.exe") {
            Write-Host "Build successful"
            Get-Item "dist\tz-convert.exe" | Select-Object Name, Length
          } else {
            Write-Error "EXE not found"
            exit 1
          }

      - name: Rename with version
        shell: bash
        run: |
          mv dist/tz-convert.exe "dist/tz-convert-${{ needs.check.outputs.version }}-windows-x64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tz-convert-exe
          path: dist/tz-convert-*.exe
          retention-days: 1

  # ── 3. Create GitHub Release ──────────────────────────────
  release:
    name: Create Release
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: tz-convert-exe
          path: dist/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.check.outputs.version }}
          name: TZ-Convert ${{ needs.check.outputs.version }}
          body: |
            ## Precise IANA timezone resolution and conversion — desktop GUI, Flask API, and an offline-capable static site.

            ## ✨ Socials & Stars
            [![Live Site](https://img.shields.io/badge/Live%20Site-tzc.ash1421.com-6829B1?style=for-the-badge&logo=github-pages&logoColor=white&labelColor=1c1917)](https://tzc.ash1421.com)
            [![GitHub Stars](https://img.shields.io/github/stars/Ash1421/TZ-Convert?style=for-the-badge&logo=github&logoColor=white&labelColor=1c1917&color=gold)](https://github.com/Ash1421/TZ-Convert/stargazers)

            ## 💜 Donations & Funding

            #### Donations and or support are appreciated very much!
            #### If you would like to show love to the creator of this project please consider donating on Ko-fi.

            [![Ko-fi](https://img.shields.io/badge/Ko--fi-Donate-FF69B4?style=for-the-badge&logo=kofi&logoColor=white&labelColor=1c1917)](https://kofi.ash1421.com)

            ## GitHub Repository Information
            [![GitHub Issues](https://img.shields.io/github/issues/Ash1421/TZ-Convert/open?style=for-the-badge&labelColor=1c1917&logo=github&logoColor=white)](https://github.com/Ash1421/TZ-Convert/issues)
            [![Closed Issues](https://img.shields.io/github/issues-closed/Ash1421/TZ-Convert/closed?style=for-the-badge&color=red&labelColor=1c1917&logo=github&logoColor=white)](https://github.com/Ash1421/TZ-Convert/issues?q=is:closed)
            [![New Issue](https://img.shields.io/badge/Open%20A%20New-Issue-orange?style=for-the-badge&labelColor=1c1917&logo=github&logoColor=white)](https://github.com/Ash1421/TZ-Convert/issues/new/choose)

            ## 📜 Licensed Under
            [![License: GPL v3.0](https://img.shields.io/badge/License-GPL%20v3.0-6829B1.svg?style=for-the-badge&labelColor=1c1917&logo=gnu&logoColor=white)](./LICENSE)

            ---

            ## 🚀 Usage

            **GUI (default):** Double-click `tz-convert-${{ needs.check.outputs.version }}-windows-x64.exe`

            **Web server:**
            ```
            tz-convert.exe --server
            ```
            Open `http://127.0.0.1:5000`

            **CLI:**
            ```
            tz-convert.exe --cli Denver
            tz-convert.exe --cli "2026-06-22 14:30" UTC "Australia/Sydney"
            ```

          artifacts: dist/tz-convert-${{ needs.check.outputs.version }}-windows-x64.exe
